- name: Applications
  prefix: Super
  keybinds:
    - name: Open Terminal
      key: Return
    - name: Open File Manager
      key: F
    - name: Open Visual Editor
      key: C
    - name: Open Web Browser
      key: B
    - name: Open Terminal Editor
      key: T
    - name: Open Multiplexer
      key: M
    - name: Open System Monitor
      key: Escape

- name: Clipboard
  prefix: Super
  keybinds:
    - name: Open Pasteboard
      key: Alt + V

- name: Launcher
  prefix: Super
  keybinds:
    - name: Desktop Applications
      key: Space
    - name: All Applications
      key: Alt + Space
    - name: Window Switcher
      key: Tab
    - name: Browse Files
      key: Shift + Tab

- name: Notifications
  prefix: Super
  keybinds:
    - name: Open Notification Center
      key: N
    - name: Clear All Notifications
      key: Alt + N
    - name: Toggle Do Not Disturb
      key: Shift + N
      
- name: Screenshots
  prefix: Super
  keybinds:
    - name: Drag To Snip
      key: Print Scrn
    - name: Freeze Screen & Drag To Snip
      key: Shift + Print Scrn
    - name: Capture Focused Monitor
      key: Alt + Print Scrn
    - name: Capture All Monitors
      key: Ctrl + Print Scrn

- name: Session
  prefix: Super + Ctrl
  keybinds:
    - name: Reload Hyprland
      key: Delete
    - name: Kill Hyprland
      key: Shift + Alt + Delete
    - name: Lock Screen
      key: Backspace
    - name: Logout
      key: Alt + Backspace
    - name: Enable Gamemode
      key: Shift + Alt + G
    - name: Show Keybinds
      key: Super + '`'
      ignore_prefix: true

- name: Theme Controls
  prefix: Super + Ctrl + Shift + Alt
  keybinds:
    - name: Next Wallpaper
      key: →
    - name: Previous Wallpaper
      key: ←
    - name: Next Waybar Position
      key: ↓
    - name: Previous Waybar Position
      key: ↑
    - name: Toggle Waybar
      key: Q
    - name: Toggle Wallbash
      key: E
    - name: Theme Select
      key: T
    - name: Launcher Style Select
      key: R
    - name: Wallpaper Select
      key: T
    - name: Keyboard Layout Select
      key: K

- name: Windows
  prefix: Super
  keybinds:
    - name: Kill Focused Window
      key: Q
    - name: Switch Tiling Layout
      key: J
    - name: Group Focused Window
      key: G
    - name: Pin Focused Window
      key: Shift + F
    - name: Toggle Floating On Focused Window
      key: W
    - name: Toggle Maximize On Focused Window
      key: Shift + W
    - name: Toggle Fullscreen On Focused Window
      key: Alt + W
    - name: Switch Focus
      key: ←/→/↓/↑
    - name: Move Focused Window Around Workspace
      key: Shift + ←/→/↓/↑
    - name: Move Windows Around Workspace With Mouse
      key: Shift + Left Click
    - name: Resize Focused Window
      key: Alt + ←/→/↓/↑
    - name: Resize Windows With Mouse
      key: Alt + Left Click
    - name: Move Focused Window To Workspace {1..0}
      key: Ctrl + {1..0}
    - name: Move Focused Window To Special Workspace
      key: Ctrl + '-'
    - name: Move Focused Window To Empty Workspace
      key: Ctrl + '='
    - name: Move Focused Window To Existing Workspace
      key: Ctrl + ↓/↑
    - name: Move Focused Window To Existing Workspace With Mouse
      key: Ctrl + Mousewheel ↓/↑
    - name: Move Focused Window To Relative Workspace
      key: Ctrl + ←/→
    - name: Move Focused Window To Relative Workspace With Mouse
      key: Ctrl + Mousewheel ←/→
    - name: Move Focused Window To Workspace {1..0} Silently
      key: Ctrl + Shift + {1..0}
    - name: Move Focused Window To Special Workspace Silently
      key: Ctrl + Shift + '-'
    - name: Move Focused Window To Empty Workspace Silently
      key: Ctrl + Shift + '='
    - name: Move Focused Window To Existing Workspace Silently
      key: Ctrl + Shift + ↓/↑
    - name: Move Focused Window To Existing Workspace With Mouse Silently
      key: Ctrl + Shift + Mousewheel ↓/↑
    - name: Move Focused Window To Relative Workspace Silently
      key: Ctrl + Shift + ←/→
    - name: Move Focused Window To Relative Workspace With Mouse Silently
      key: Ctrl + Shift + Mousewheel ←/→

- name: Workspaces
  prefix: Super + Ctrl + Alt
  keybinds:
    - name: Switch To Workspace {1..0}
      key: Super + '{1..0}'
      ignore_prefix: true
    - name: Switch To Special Workspace
      key: Super + '-'
      ignore_prefix: true
    - name: Switch To Empty Workspace
      key: Super + '='
      ignore_prefix: true
    - name: Switch To Existing Workspace
      key: Ctrl + Alt + ↓/↑
    - name: Switch To Existing Workspace With Mouse
      key: Ctrl + Alt + Mousewheel ↓/↑
    - name: Switch To Relative Workspace
      key: Ctrl + Alt + ←/→
    - name: Switch To Relative Workspace With Mouse
      key: Ctrl + Alt + Mousewheel ←/→
